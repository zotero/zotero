publications.intro.text1=「私の出版物」を使えば、あなたはご自分の著作のリストを作成し、それを %S におけるご自身のプロファイルページ上で共有することができます。個々の項目についてのメモを追加することができ、あなたの指定したライセンスの元で PDF や他のファイルを共有することも可能です。
